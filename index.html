<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acessibilidade: Transcrição e VLibras</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <header class="bg-primary text-white text-center py-4 shadow-sm">
        <h1>Sistema de Transcrição Acessível</h1>
        <p class="lead mb-0">Reconhecimento de Voz + Tradução para Libras</p>
    </header>

    <main class="container my-5 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-md-8 text-center">
                
                <div class="mb-4">
                    <button id="btn-gravar" class="btn btn-danger btn-lg shadow">
                        🎤 Iniciar Gravação
                    </button>
                    <p id="status-gravacao" class="mt-2 text-muted">Microfone desligado.</p>
                </div>

                <div class="form-group text-start">
                    <label for="texto-transcrito" class="form-label fw-bold">Texto Transcrito (Editável):</label>
                    <div id="texto-transcrito" class="form-control shadow-sm" contenteditable="true"></div>
                </div>
                
                <div class="mt-3 text-start text-muted small">
                    <strong>Dica de uso:</strong> Fale "vírgula" ou "ponto de interrogação" para pontuar. Ao parar a gravação, o texto será selecionado e o VLibras iniciará a tradução automaticamente.
                </div>

            </div>
        </div>
    </main>

    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
            <div class="vw-plugin-top-wrapper"></div>
        </div>
    </div>

    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
        new window.VLibras.Widget('https://vlibras.gov.br/app');
    </script>
    
    <script src="app.js"></script>
</body>
</html>
