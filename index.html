<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxScript - Transcrição Acessível</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <header class="bg-primary text-white text-center py-4 mb-5 shadow-sm">
        <h1 class="display-5 fw-bold">VoxScript: Sistema de Transcrição Acessível</h1>
        <p class="lead mb-0">Reconhecimento de Voz + Tradução para Libras</p>
    </header>

    <main class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                
                <div class="d-flex justify-content-center gap-3 mb-3">
                    <button id="btn-gravar" class="btn btn-danger btn-lg shadow-sm">
                        🎤 Iniciar Gravação
                    </button>
                    <button id="btn-atualizar" class="btn btn-secondary btn-lg shadow-sm" onclick="window.location.reload()">
                        🔄 Atualizar
                    </button>
                </div>

                <p id="status-gravacao" class="text-center text-muted mb-4 fw-medium">
                    Microfone desligado.
                </p>

                <div class="card shadow-sm mb-3">
                    <div class="card-header bg-white fw-bold">
                        Texto Transcrito (Editável):
                    </div>
                    <div class="card-body p-0">
                        <div id="texto-transcrito" class="form-control border-0 p-3" style="min-height: 150px; outline: none; font-size: 1.1rem; overflow-y: auto;" contenteditable="true"></div>
                    </div>
                </div>
                
                <p class="text-muted small text-center mt-3">
                    <strong>Dica de uso:</strong> Fale naturalmente e a Inteligência Artificial cuidará da pontuação para você. <br>
                    Para limpar a tela usando a voz, diga: <em>"Vox, apague o texto"</em>.
                </p>

            </div>
        </div>
    </main>

    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
            <div class="vw-plugin-top-wrapper"></div>
        </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
        new window.VLibras.Widget('https://vlibras.gov.br/app');
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
